<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Trackify KPI</title>

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />

  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />

  <!-- Material Symbols -->
  <link rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />

  <!-- Global styles -->
  <link rel="stylesheet" href="../css/style.css">

  <!--
    Module-specific CSS files are linked here in the shell so they are
    always available regardless of which view fragment is currently loaded.
    Add a new line here whenever a new module has its own CSS file.
  -->
  <link rel="stylesheet" href="../modules/assignment_verification/assignment_verification.css">
  <link rel="stylesheet" href="../modules/assignment/assignment.css">
  <link rel="stylesheet" href="../modules/review/review.css">
  <link rel="stylesheet" href="../modules/progress/progress.css">
  <link rel="stylesheet" href="../modules/kpi-detail/kpi-detail.css">
  <link rel="stylesheet" href="../modules/submit-evidence/submit-evidence.css">
  <link rel="stylesheet" href="../modules/kpi/kpi.css">
  <link rel="stylesheet" href="../modules/update-kpi/update-kpi.css">
  <link rel="stylesheet" href="../modules/create-kpi/create-kpi.css">
  <link rel="stylesheet" href="../modules/delete-kpi/delete-kpi.css">
  <link rel="stylesheet" href="../modules/kpi-list/kpi-list.css">
  <link rel="stylesheet" href="../modules/notification/notification.css">
  <link rel="stylesheet" href="../modules/manager-dashboard/manager-dashboard.css">
  <link rel="stylesheet" href="../modules/staff-dashboard/staff-dashboard.css">
  <link rel="stylesheet" href="../modules/report/report.css">
  <link rel="stylesheet" href="../modules/profile/profile.css">
</head>

<body>

  <!-- Sidebar — injected once by layout.js, never reloads -->
  <div id="sidebar-container"></div>

  <main class="main-content">

    <!-- Topbar — injected once by layout.js, never reloads -->
    <div id="navbar-container"></div>

    <!-- Only this div gets swapped when navigating -->
    <div id="page-content"></div>

  </main>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <!--
    All module JS files are loaded here in the shell not under html in views
    Load order: module scripts first, then sidebar.js, then layout.js last.
    Add a new line here whenever a new module has its own JS file.
  -->

  <script src="../modules/delete-kpi/delete-kpi.js"></script>
  <script src="../modules/create-kpi/create-kpi.js"></script>
  <script src="../modules/update-kpi/update-kpi.js"></script>
  <script src="../modules/kpi/kpi.js"></script>
  <script src="../modules/kpi-list/kpi-list.js"></script>
  <script src="../modules/assignment/assignment.js"></script>
  <script src="../modules/review/review.js"></script>
  <script src="../components/progress-card.js"></script>
  <script src="../modules/progress/progress.js"></script>
  <!-- Tailwind CSS (loaded after progress.js so config is picked up) -->
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <script src="../modules/kpi-detail/kpi-detail.js"></script>
  <script src="../modules/submit-evidence/submit-evidence.js"></script>
  <script src="../modules/notification/notification.js"></script>
  <script src="../modules/assignment_verification/assignment_verification.js"></script>
  <script src="../modules/profile/profile.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="../modules/shared/kpi-data.js"></script>
  <script src="../modules/manager-dashboard/manager-dashboard.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="../modules/staff-dashboard/staff-dashboard.js"></script>
  <script src="../modules/report/report.js"></script>
  <script src="../modules/navbar/sidebar.js"></script>
  <script src="../modules/navbar/layout.js"></script>
</body>

</html>
