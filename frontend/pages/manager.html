<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Trackify KPI Management Dashboard</title>

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>

  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"/>

  <!-- Custom CSS -->
  <link rel="stylesheet" href="../css/style.css">
</head>

<body>

  <!-- Sidebar -->
  <aside class="sidebar">

    <!-- Logo -->
    <div class="d-flex align-items-center gap-3 mb-5">
      <div class="logo-box">
        <i class="bi bi-bar-chart-line-fill"></i>
      </div>

      <div>
        <h2 class="fw-bold mb-0">Trackify</h2>
        <small class="text-muted">KPI Management System</small>
      </div>
    </div>

    <!-- Navigation -->
    <nav class="nav flex-column">

      <a href="#" class="nav-link active" onclick="changePage(event, 'Dashboard')">
        <i class="bi bi-grid-fill"></i>
        Dashboard
      </a>

      <a href="#" class="nav-link" onclick="changePage(event, 'KPI Management')">
        <i class="bi bi-graph-up"></i>
        KPI Management
      </a>

    </nav>

    <!-- Bottom -->
    <div class="nav-bottom">

      <a href="#" class="nav-link" onclick="changePage(event, 'Profile')">
        <i class="bi bi-person-circle"></i>
        Profile
      </a>

      <a href="#" class="nav-link" onclick="logout()">
        <i class="bi bi-box-arrow-right"></i>
        Logout
      </a>

    </div>

  </aside>


  <!-- Main Content -->
  <main class="main-content">

    <!-- Top Bar -->
    <header class="topbar d-flex justify-content-between align-items-center px-4">

      <!-- Search -->
      <div class="search-wrapper">
        <i class="bi bi-search"></i>
        <input 
          type="text" 
          class="form-control search-box" 
          placeholder="Search..."
          onkeyup="searchKPI()"
          id="searchInput"
        />
      </div>

      <!-- Right -->
      <div class="d-flex align-items-center gap-4">

        <button class="notification-btn" onclick="showNotification()">
          <i class="bi bi-bell"></i>
          <span class="notification-dot"></span>
        </button>

        <img src="https://via.placeholder.com/40" class="profile-img">

      </div>

    </header>

    <!-- Content -->
    <section class="p-4">

      <div class="mb-4">
        <h1 id="mainHeading" class="fw-bold">Dashboard</h1>
        <p id="subText" class="text-muted">
          Welcome to the Trackify KPI Management System.
        </p>
      </div>

    </section>

  </main>


  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <!-- JavaScript -->
  <script>
    function changePage(event, pageName) {
      event.preventDefault();

      const navLinks = document.querySelectorAll(".nav-link");

      navLinks.forEach(link => link.classList.remove("active"));
      event.currentTarget.classList.add("active");

      document.getElementById("mainHeading").textContent = pageName;

      if (pageName === "Dashboard") {
        document.getElementById("subText").textContent = "Welcome to the Trackify KPI Management System.";
      } else if (pageName === "KPI Management") {
        document.getElementById("subText").textContent = "Create, view, update and manage KPIs here.";
      } else if (pageName === "Profile") {
        document.getElementById("subText").textContent = "View and manage your personal profile information.";
      }
    }

  
  </script>

</body>
</html>
