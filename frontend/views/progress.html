<section class="progress-view py-4 py-lg-5">
    <div class="container-fluid kpi-container">
        <nav aria-label="breadcrumb" class="mb-3">
            <ol class="breadcrumb">
                <li class="breadcrumb-item" onclick="changePage(event, 'Staff Dashboard')"><a href="#">Staff Dashboard</a></li>
                <li class="breadcrumb-item active" aria-current="page">KPI Progress</li>
            </ol>
        </nav>

        <header class="mb-4">
            <h1 class="kpi-page-title mb-0">KPI Progress</h1>
            <p class="text-muted mb-0 mt-2 small" id="progress-data-summary"></p>
        </header>

        <div class="card border-0 shadow-sm progress-toolbar mb-4">
            <div class="card-body d-flex flex-column flex-sm-row align-items-sm-center gap-3">
                <span class="progress-toolbar__label text-nowrap">My Assigned KPIs</span>
                <div class="position-relative flex-grow-1">
                    <span class="material-symbols-outlined progress-search-icon">search</span>
                    <input type="text" id="progress-search-input" class="form-control progress-search-input" placeholder="Search KPIs..." autocomplete="off" />
                </div>
                <div class="d-flex align-items-center gap-2 ms-sm-auto">
                    <button type="button" class="btn progress-filter-btn" id="progress-filter-toggle" data-bs-toggle="collapse" data-bs-target="#progress-status-filters" aria-expanded="false" aria-controls="progress-status-filters">
                        <span class="material-symbols-outlined" aria-hidden="true">filter_list</span>
                        <span>Filters</span>
                    </button>
                    <a href="#" class="kpi-link-btn text-nowrap" id="progress-view-all-link" onclick="changePage(event, 'View KPI List')">View All</a>
              
                </div>
            </div>
        </div>

        <div class="collapse mb-4" id="progress-status-filters">
            <div class="card border-0 shadow-sm progress-filter-panel">
                <div class="card-body py-3 px-3 px-sm-4">
                    <label class="form-label progress-filter-label mb-2">Filter by status</label>
                    <div class="d-flex gap-2 flex-wrap align-items-center progress-filter-status mb-4">
                        <button type="button" class="status-btn all active" data-filter="all">All</button>
                        <button type="button" class="status-btn pending" data-filter="pending">Pending</button>
                        <button type="button" class="status-btn progress" data-filter="inprogress">In Progress</button>
                        <button type="button" class="status-btn completed" data-filter="completed">Completed</button>
                        <button type="button" class="status-btn overdue" data-filter="overdue">Overdue</button>
                    </div>
                    <label class="form-label progress-filter-label mb-2">Filter by priority</label>
                    <div class="d-flex gap-2 flex-wrap align-items-center progress-filter-priority">
                        <button type="button" class="status-btn priority-all active" data-priority-filter="all">All priorities</button>
                        <button type="button" class="status-btn priority-high" data-priority-filter="high">High</button>
                        <button type="button" class="status-btn priority-medium" data-priority-filter="medium">Medium</button>
                        <button type="button" class="status-btn priority-low" data-priority-filter="low">Low</button>
                    </div>
                </div>
            </div>
        </div>

        <div id="kpi-cards-container" class="row g-4">
            <!-- Cards are dynamically injected here by progress-card.js -->
        </div>
    </div>
</section>
