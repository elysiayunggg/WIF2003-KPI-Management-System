<!-- KPI Progress Card Component Template -->
<div class="col-12 col-md-6 col-xl-4">
    <article class="card progress-card progress-card--{{styleType}} {{customClasses}} h-100" data-kpi-index="{{kpiIndex}}">
        <div class="card-body d-flex flex-column">
            <div class="d-flex justify-content-between align-items-start mb-3">
                <span class="progress-card__badge">{{statusText}}</span>
                <div class="dropdown">
                    <button class="btn btn-sm progress-card__menu-btn" type="button" data-bs-toggle="dropdown" aria-expanded="false" aria-label="Card actions">
                        <span class="material-symbols-outlined">more_vert</span>
                    </button>
                    <ul class="dropdown-menu dropdown-menu-end progress-card__menu">
                        <li>
                            <a class="dropdown-item" href="#">
                                <span class="material-symbols-outlined">edit</span>Edit KPI
                            </a>
                        </li>
                        <li>
                            <a class="dropdown-item" href="#">
                                <span class="material-symbols-outlined">share</span>Share
                            </a>
                        </li>
                        <li>
                            <a class="dropdown-item" href="#">
                                <span class="material-symbols-outlined">history</span>View History
                            </a>
                        </li>
                        <li><hr class="dropdown-divider" /></li>
                        <li>
                            <a class="dropdown-item progress-card__menu-danger" href="#">
                                <span class="material-symbols-outlined">delete</span>Delete
                            </a>
                        </li>
                    </ul>
                </div>
            </div>

            <h2 class="progress-card__title">{{title}}</h2>
            <p class="progress-card__desc flex-grow-1">{{description}}</p>

            <div class="progress-card__date {{dateFontWeight}}">
                <span class="material-symbols-outlined">{{dateIcon}}</span>
                <span>Due: {{dueDate}}</span>
            </div>

            <div class="progress-card__meta">
                <span class="progress-card__label">PROGRESS</span>
                <span class="progress-card__percent">{{progress}}%</span>
            </div>
            <div class="progress progress-card__bar">
                <!-- Width applied at runtime in progress-card.js (avoids invalid CSS in style="" for linters) -->
                <div class="progress-bar progress-card__bar-fill" role="progressbar" aria-valuenow="{{progress}}" aria-valuemin="0" aria-valuemax="100"></div>
            </div>

            <button type="button" class="btn progress-card__action kpi-action-btn">{{buttonText}}</button>
        </div>
    </article>
</div>
