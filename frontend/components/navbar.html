<header class="topbar d-flex justify-content-between align-items-center px-4">
    <div class="search-wrapper">
      <i class="bi bi-search"></i>
      <input 
        type="text" 
        class="form-control search-box" 
        placeholder="Search..."
        onkeyup="searchKPI()"
        id="searchInput"
      />
    </div>
  
    <div class="d-flex align-items-center gap-4">
      <div class="notification-wrapper position-relative">
        <button class="notification-btn" onclick="showNotification()" id="notificationBell">
          <i class="bi bi-bell"></i>
          <span id="unreadBadge" style="display: none;"></span>
        </button>

        <!-- Notification Overlay -->
        <div class="notification-overlay" id="notificationOverlay">
          <div class="notification-header">
            <h6>Notifications</h6>
            <button type="button" class="mark-all-read" onclick="markAllAsRead()">Mark all read</button>
          </div>
          <div class="notification-list" id="notificationList">
            <!-- Notifications injected by notification.js -->
          </div>
          <div class="notification-footer">
            <a href="#">View all notifications</a>
          </div>
        </div>
      </div>

      <i class="bi bi-person-circle profile-img" alt="Profile"></i>

    </div>
  </header>
